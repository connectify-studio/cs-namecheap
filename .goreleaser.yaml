# GoReleaser configuration — https://goreleaser.com
# Validate locally with:  goreleaser check
# Dry-run a build with:    goreleaser release --snapshot --clean
version: 2

project_name: cs-namecheap

before:
  hooks:
    - go mod download

builds:
  - id: cs-namecheap
    main: .
    binary: cs-namecheap
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .CommitDate }}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: default
    formats: [tar.gz]
    # Use zip for Windows so it unpacks cleanly there.
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README*

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  draft: false
  prerelease: auto # tags like v0.1.0-rc1 are marked as pre-releases
